<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo-link">
            <div class="logo-icono">🎁</div>
            UPN<span>Dona</span>
        </a>
        <ul class="navbar-links">
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="donar.html">Donar</a></li>
            <li><a href="voluntario.html">Voluntario</a></li>
            <li><a href="mis-donaciones.html">Mis donaciones</a></li>
        </ul>
        <div class="navbar-acciones">
            <a href="favoritos.html" style="text-decoration: none; font-size: 1.4rem; color: #ffffff; display: flex; align-items: center; margin-right: 12px; cursor: pointer;">♡</a>
            <a href="login.html" class="btn-iniciar" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Iniciar sesión</a>
            <a href="donar.html" class="btn-amarillo" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Donar ahora</a>
        </div>
    </nav>

    <!-- ===== FORMULARIO DE NECESIDAD ===== -->
    <div class="donar-contenedor">
        <a href="index.html" class="volver-link">← Volver al inicio</a>
        
        <h1 class="form-titulo">Publicar una necesidad</h1>
        <p class="form-subtitulo">Completa el formulario para solicitar un artículo a la comunidad</p>

        <div class="form-caja">
            <!-- El action lleva a la página de éxito -->
            <form action="necesidad-exitosa.html">
                
                <div class="form-grupo">
                    <label for="nombre">¿Qué artículo necesitas?</label>
                    <input type="text" id="nombre" placeholder="Ej: Calculadora científica, Libro de Física..." required>
                </div>

                <div class="form-grupo">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" required>
                        <option value="" disabled selected>Selecciona una categoría</option>
                        <option value="libros">Libros</option>
                        <option value="ropa">Ropa</option>
                        <option value="electronica">Electrónicos</option>
                        <option value="otros">Otros</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="descripcion">Descripción de la necesidad</label>
                    <textarea id="descripcion" rows="4" placeholder="Describe por qué lo necesitas, detalles específicos o condiciones..." required></textarea>
                </div>

                <button type="submit" class="btn-publicar">📢 Publicar necesidad</button>
            </form>
        </div>
    </div>

</body>
</html>
