<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - UPNDona</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo-link">
            <div class="logo-icono">🎁</div>
            UPN<span>Dona</span>
        </a>

        <ul class="navbar-links">
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="donar.html">Donar</a></li>
            <li><a href="voluntario.html">Voluntario</a></li>
            <li><a href="mis-donaciones.html">Mis donaciones</a></li>
            <!-- Estamos en esta página, así que NO es un enlace, es un span -->
            <li><span class="nav-activo">Iniciar sesión</span></li>
        </ul>

        <div class="navbar-acciones">
            <span class="icono-corazon">♡</span>
            <!-- Botón desactivado visualmente porque ya estamos aquí -->
            <span class="btn-iniciar" style="cursor: default; opacity: 0.7; display: flex; align-items: center; justify-content: center;">Iniciar sesión</span>
            <a href="donar.html" class="btn-amarillo" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Donar ahora</a>
        </div>
    </nav>

    <!-- ===== FORMULARIO LOGIN ===== -->
    <section class="login-contenedor">
        <div class="login-caja">
            <h2>Bienvenido de nuevo</h2>
            <p>Ingresa tus datos para acceder a tu cuenta</p>

            <form action="#">
                <div class="form-grupo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@upn.edu.pe" required>
                </div>

                <div class="form-grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-amarillo-completo">Ingresar</button>
            </form>

            <div class="login-switch">
                ¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
            </div>
        </div>
    </section>

</body>
</html>
