<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - UPNDona</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== INTERFAZ: BARRA DE NAVEGACIÓN (NAVBAR) ===== -->
    <nav class="navbar">
        <!-- Logo de texto limpio -->
        <a href="index.html" class="navbar-logo-link">
            UPN<span>Dona</span>
        </a>
        
        <!-- Menú de enlaces principales -->
        <ul class="navbar-links">
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="necesidades.html">Necesidades</a></li> 
            <li><a href="donar.html">Donar</a></li>
            <li><a href="voluntario.html">Voluntario</a></li>
            <li><a href="mis-donaciones.html">Mis donaciones</a></li>
        </ul>
        
        <!-- Botones de acción y usuario -->
        <div class="navbar-acciones">
            <a href="favoritos.html" style="text-decoration: none; font-size: 1.4rem; color: #ffffff; display: flex; align-items: center; margin-right: 12px; cursor: pointer;">♡</a>
            
            <a href="login.html" id="btn-iniciar" class="btn-iniciar" style="text-decoration: none; display: none; align-items: center; justify-content: center;">Iniciar sesión</a>
            
            <a href="index.html" id="btn-cerrar" onclick="sessionStorage.clear()" style="text-decoration: none; color: #ffffff; font-size: 0.85rem; margin-right: 16px; cursor: pointer; border-bottom: 1px solid #ffffff; padding-bottom: 2px; display: none;">Cerrar sesión</a>
            
            <a href="donar.html" class="btn-amarillo" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Donar ahora</a>
        </div>
    </nav>

    <!-- ===== LÓGICA: MOSTRAR EL BOTÓN CORRECTO SEGÚN LA SESIÓN ===== -->
    <script>
        if (sessionStorage.getItem('usuarioLogueado')) {
            document.getElementById('btn-cerrar').style.display = 'flex';
        } else {
            document.getElementById('btn-iniciar').style.display = 'flex';
        }
    </script>

    <!-- ===== FORMULARIO DE INICIO DE SESIÓN ===== -->
    <section class="login-contenedor">
        <div class="login-caja">
            <h2>Bienvenido de nuevo</h2>
            <p>Ingresa tus datos para acceder a tu cuenta</p>

            <form action="#">
                <div class="form-grupo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@upn.edu.pe" required>
                </div>

                <div class="form-grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-amarillo-completo">Ingresar</button>
            </form>

            <div class="login-switch">
                ¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
            </div>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="recuperar.html" style="color: #888888; font-size: 0.85rem; text-decoration: none;">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </section>

    <!-- ===== LÓGICA: VERIFICAR REGISTRO Y REDIRIGIR A EVALUACIÓN ===== -->
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue de forma tradicional
            
            // 1. Buscamos si el usuario se registró previamente
            const usuarioGuardado = sessionStorage.getItem('usuarioRegistrado');
            
            if (usuarioGuardado) {
                // 2. Si existe, marcamos que la sesión está activa
                sessionStorage.setItem('usuarioLogueado', usuarioGuardado);
                alert('¡Bienvenido de nuevo, ' + usuarioGuardado + '!');
                
                // 3. ¡ESTA ES LA LÍNEA CLAVE! Te manda directo a la evaluación
                window.location.href = 'evaluacion.html'; 
            } else {
                // 4. Si no hay nadie registrado, lo mandamos a registrarse
                alert('No hay usuarios registrados. Por favor, regístrate primero.');
                window.location.href = 'registro.html';
            }
        });
    </script>

</body>
</html>
