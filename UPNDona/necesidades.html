<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necesidades - UPNDona</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== INTERFAZ: BARRA DE NAVEGACIÓN (NAVBAR) ===== -->
    <nav class="navbar">
        <!-- Logo de texto limpio -->
        <a href="index.html" class="navbar-logo-link">
            UPN<span>Dona</span>
        </a>
        
        <!-- Menú de enlaces principales -->
        <ul class="navbar-links">
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="necesidades.html">Necesidades</a></li> 
            <li><a href="donar.html">Donar</a></li>
            <li><a href="voluntario.html">Voluntario</a></li>
            <li><a href="mis-donaciones.html">Mis donaciones</a></li>
        </ul>
        
        <!-- Botones de acción y usuario -->
        <div class="navbar-acciones">
            <!-- Enlace a Favoritos -->
            <a href="favoritos.html" style="text-decoration: none; font-size: 1.4rem; color: #ffffff; display: flex; align-items: center; margin-right: 12px; cursor: pointer;">♡</a>
            
            <!-- Botón Iniciar Sesión (Oculto por defecto, se muestra con JS si NO hay sesión) -->
            <a href="login.html" id="btn-iniciar" class="btn-iniciar" style="text-decoration: none; display: none; align-items: center; justify-content: center;">Iniciar sesión</a>
            
            <!-- Botón Cerrar Sesión (Oculto por defecto, se muestra con JS si SÍ hay sesión) -->
            <a href="index.html" id="btn-cerrar" onclick="sessionStorage.clear()" style="text-decoration: none; color: #ffffff; font-size: 0.85rem; margin-right: 16px; cursor: pointer; border-bottom: 1px solid #ffffff; padding-bottom: 2px; display: none;">Cerrar sesión</a>
            
            <!-- Botón Donar Ahora -->
            <a href="donar.html" class="btn-amarillo" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Donar ahora</a>
        </div>
    </nav>

    <!-- ===== LÓGICA: MOSTRAR EL BOTÓN CORRECTO SEGÚN LA SESIÓN ===== -->
    <script>
        // Verificamos si existe un usuario guardado en la sesión actual
        if (sessionStorage.getItem('usuarioLogueado')) {
            // Si hay sesión activa, mostramos "Cerrar sesión"
            document.getElementById('btn-cerrar').style.display = 'flex';
        } else {
            // Si no hay sesión, mostramos "Iniciar sesión"
            document.getElementById('btn-iniciar').style.display = 'flex';
        }
    </script>

    <!-- ===== NECESIDADES DE LA COMUNIDAD ===== -->
    <section class="donaciones" style="padding-top: 40px; min-height: 80vh;">
        <div class="donaciones-encabezado">
            <div>
                <h2>Necesidades de la comunidad</h2>
                <p class="donaciones-subtitulo">Artículos que los estudiantes están buscando activamente</p>
            </div>
            <!-- Botón que lleva a publicar una nueva necesidad -->
            <a href="publicar-necesidad.html" class="btn-amarillo" style="text-decoration: none; display: inline-flex; align-items: center; padding: 8px 16px; font-size: 0.85rem;">+ Publicar necesidad</a>
        </div>

        <!-- Filtros de categoría con lógica de clic agregada -->
        <div class="categorias-grid" style="margin-bottom: 40px; justify-content: flex-start;">
            <div class="categoria-item" style="background-color: #F5B400; border-color: #F5B400; cursor: pointer;" onclick="filtrarNecesidad('todos', this)">
                <span class="categoria-nombre" style="color: #111111;">Todos</span>
            </div>
            <div class="categoria-item" style="cursor: pointer;" onclick="filtrarNecesidad('libros', this)">
                <span class="categoria-nombre">Libros</span>
            </div>
            <div class="categoria-item" style="cursor: pointer;" onclick="filtrarNecesidad('ropa', this)">
                <span class="categoria-nombre">Ropa</span>
            </div>
            <div class="categoria-item" style="cursor: pointer;" onclick="filtrarNecesidad('electronica', this)">
                <span class="categoria-nombre">Electrónicos</span>
            </div>
            <div class="categoria-item" style="cursor: pointer;" onclick="filtrarNecesidad('otros', this)">
                <span class="categoria-nombre">Otros</span>
            </div>
        </div>

        <!-- Aquí el JavaScript dibujará las necesidades reales guardadas -->
        <div class="tarjetas-grid" id="grid-necesidades"></div>

    </section>

    <!-- SCRIPT: Muestra y FILTRA las necesidades guardadas -->
    <script>
        // 1. Cargar necesidades de la memoria
        const necesidadesGuardadas = JSON.parse(localStorage.getItem('necesidades')) || [];
        const grid = document.getElementById('grid-necesidades');

        // 2. Función para dibujar las tarjetas
        function renderizarNecesidades(filtro = 'todos') {
            grid.innerHTML = ''; // Limpiamos el grid

            // Filtramos por categoría
            const necesidadesFiltradas = filtro === 'todos' 
                ? necesidadesGuardadas 
                : necesidadesGuardadas.filter(item => item.categoria.toLowerCase() === filtro.toLowerCase());

            // Si no hay artículos en esa categoría, mostramos un mensaje
            if (necesidadesFiltradas.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px; font-size: 1.1rem;">No hay necesidades publicadas en esta categoría por el momento.</p>';
                return;
            }

            // Dibujamos cada tarjeta que pasó el filtro
            necesidadesFiltradas.forEach((item) => {
                const cardHTML = `
                    <div class="tarjeta">
                        <div class="tarjeta-imagen">
                            ${item.imagen || '🔍'}
                            <span class="badge" style="background-color: #3b82f6;">Buscando</span>
                        </div>
                        <div class="tarjeta-cuerpo">
                            <p class="tarjeta-categoria">${item.categoria}</p>
                            <p class="tarjeta-titulo">${item.nombre}</p>
                            <p style="font-size: 0.8rem; color: #888888; margin-bottom: 12px; line-height: 1.4;">
                                ${item.descripcion ? item.descripcion.substring(0, 80) + '...' : 'Sin descripción'}
                            </p>
                            <a href="donar.html" class="btn-ver-detalle" style="display: block; text-align: center; text-decoration: none; padding: 10px 0; background-color: #111111; color: #ffffff;">Tengo este artículo</a>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // 3. Función que se ejecuta al hacer clic en un botón de filtro
        function filtrarNecesidad(categoria, boton) {
            // Quitar el color amarillo de TODOS los botones
            const botones = document.querySelectorAll('.categoria-item');
            botones.forEach(btn => {
                btn.style.backgroundColor = '#ffffff';
                btn.style.borderColor = '#e5e5e5';
                btn.querySelector('.categoria-nombre').style.color = '#111111';
            });

            // Poner el color amarillo SOLO al botón clickeado
            boton.style.backgroundColor = '#F5B400';
            boton.style.borderColor = '#F5B400';
            boton.querySelector('.categoria-nombre').style.color = '#111111';

            // Volver a dibujar con el nuevo filtro
            renderizarNecesidades(categoria);
        }

        // 4. Al cargar la página, mostramos "todos"
        renderizarNecesidades('todos');
    </script>

</body>
</html>
