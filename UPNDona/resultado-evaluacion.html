<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado de Evaluación - UPNDona</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== INTERFAZ: BARRA DE NAVEGACIÓN (NAVBAR) ===== -->
    <nav class="navbar">
        <!-- Logo de texto limpio -->
        <a href="index.html" class="navbar-logo-link">
            UPN<span>Dona</span>
        </a>
        
        <!-- Menú de enlaces principales -->
        <ul class="navbar-links">
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="necesidades.html">Necesidades</a></li> 
            <li><a href="donar.html">Donar</a></li>
            <li><a href="voluntario.html">Voluntario</a></li>
            <li><a href="mis-donaciones.html">Mis donaciones</a></li>
        </ul>
        
        <!-- Botones de acción y usuario -->
        <div class="navbar-acciones">
            <!-- Enlace a Favoritos -->
            <a href="favoritos.html" style="text-decoration: none; font-size: 1.4rem; color: #ffffff; display: flex; align-items: center; margin-right: 12px; cursor: pointer;">♡</a>
            
            <!-- Botón Iniciar Sesión (Oculto por defecto, se muestra con JS si NO hay sesión) -->
            <a href="login.html" id="btn-iniciar" class="btn-iniciar" style="text-decoration: none; display: none; align-items: center; justify-content: center;">Iniciar sesión</a>
            
            <!-- Botón Cerrar Sesión (Oculto por defecto, se muestra con JS si SÍ hay sesión) -->
            <a href="index.html" id="btn-cerrar" onclick="sessionStorage.clear()" style="text-decoration: none; color: #ffffff; font-size: 0.85rem; margin-right: 16px; cursor: pointer; border-bottom: 1px solid #ffffff; padding-bottom: 2px; display: none;">Cerrar sesión</a>
            
            <!-- Botón Donar Ahora -->
            <a href="donar.html" class="btn-amarillo" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Donar ahora</a>
        </div>
    </nav>

    <!-- ===== LÓGICA: MOSTRAR EL BOTÓN CORRECTO SEGÚN LA SESIÓN ===== -->
    <script>
        // Verificamos si existe un usuario guardado en la sesión actual
        if (sessionStorage.getItem('usuarioLogueado')) {
            // Si hay sesión activa, mostramos "Cerrar sesión"
            document.getElementById('btn-cerrar').style.display = 'flex';
        } else {
            // Si no hay sesión, mostramos "Iniciar sesión"
            document.getElementById('btn-iniciar').style.display = 'flex';
        }
    </script>

    <section class="exito-voluntario-contenedor">
        <div class="exito-voluntario-caja">
            <div class="exito-icono-voluntario" id="icono-resultado">✓</div>
            <h2>Evaluación completada</h2>
            
            <!-- Aquí se inyectará el nivel y el puntaje calculado -->
            <p style="font-size: 1.1rem; color: #111111; font-weight: 700; margin-bottom: 16px;">
                Tu nivel de calificación es: <span id="texto-nivel" style="font-size: 1.4rem;"></span>
            </p>
            <p style="font-size: 0.85rem; color: #888888; margin-bottom: 24px;">
                Puntaje obtenido: <span id="texto-puntaje"></span> / 150 puntos
            </p>
            
            <p class="texto-correo" id="mensaje-nivel">
                <!-- El mensaje cambiará según el nivel -->
            </p>
            
            <a href="catalogo.html" class="btn-amarillo-completo">Ir al Catálogo Solidario</a>
        </div>
    </section>

    <!-- SCRIPT: MUESTRA EL RESULTADO CALCULADO -->
    <script>
        // 1. Leemos los datos guardados por el formulario anterior
        const puntaje = localStorage.getItem('puntajeSocioeconomico') || 0;
        const nivel = localStorage.getItem('nivelSocioeconomico') || 'BAJO';

        // 2. Obtenemos los elementos del HTML para modificarlos
        const textoNivel = document.getElementById('texto-nivel');
        const textoPuntaje = document.getElementById('texto-puntaje');
        const mensajeNivel = document.getElementById('mensaje-nivel');
        const iconoResultado = document.getElementById('icono-resultado');

        // 3. Mostramos el puntaje
        textoPuntaje.textContent = puntaje;

        // 4. Personalizamos el mensaje y el color según el nivel
        if (nivel === 'ALTO') {
            textoNivel.textContent = 'ALTO';
            textoNivel.style.color = '#059669'; // Verde
            iconoResultado.style.backgroundColor = '#d1fae5';
            iconoResultado.style.color = '#059669';
            mensajeNivel.textContent = '¡Felicidades! Tienes acceso prioritario y completo al Catálogo Solidario para solicitar los materiales que necesites.';
        } else if (nivel === 'MEDIO') {
            textoNivel.textContent = 'MEDIO';
            textoNivel.style.color = '#f97316'; // Naranja
            iconoResultado.style.backgroundColor = '#ffedd5';
            iconoResultado.style.color = '#f97316';
            mensajeNivel.textContent = 'Tienes acceso estándar al Catálogo Solidario. Priorizaremos tus solicitudes según la disponibilidad de los artículos.';
        } else {
            textoNivel.textContent = 'BAJO';
            textoNivel.style.color = '#6b7280'; // Gris
            iconoResultado.style.backgroundColor = '#f3f4f6';
            iconoResultado.style.color = '#6b7280';
            mensajeNivel.textContent = 'Actualmente tu nivel de prioridad es bajo. Te recomendamos acercarte a Bienestar Universitario para una re-evaluación presencial.';
        }
    </script>

</body>
</html>
