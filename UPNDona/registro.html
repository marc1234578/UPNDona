<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - UPNDona</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo-link">
            <div class="logo-icono">🎁</div>
            UPN<span>Dona</span>
        </a>

        <ul class="navbar-links">
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="donar.html">Donar</a></li>
            <li><a href="voluntario.html">Voluntario</a></li>
            <li><a href="mis-donaciones.html">Mis donaciones</a></li>
            <li><span class="nav-activo">Registro</span></li>
        </ul>

        <div class="navbar-acciones">
            <span class="icono-corazon">♡</span>
            <a href="login.html" class="btn-iniciar" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Iniciar sesión</a>
            <a href="donar.html" class="btn-amarillo" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Donar ahora</a>
        </div>
    </nav>

    <!-- ===== FORMULARIO REGISTRO ===== -->
    <section class="login-contenedor">
        <div class="login-caja">
            <h2>Crea tu cuenta</h2>
            <p>Únete a la comunidad solidaria de la UPN</p>

            <form action="#">
                <div class="form-grupo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Juan Pérez" required>
                </div>

                <div class="form-grupo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@upn.edu.pe" required>
                </div>

                <div class="form-grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                </div>

                <button type="submit" class="btn-amarillo-completo">Registrarse</button>
            </form>

            <div class="login-switch">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
            </div>
        </div>
    </section>

</body>
</html>
